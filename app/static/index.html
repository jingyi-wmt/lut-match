<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LUT Match</title>
<style>
  :root {
    --bg: #16181d; --panel: #1f2229; --panel2: #262a33; --text: #e8eaf0;
    --dim: #8a90a0; --accent: #e8734a; --accent2: #4ac2e8; --ok: #6fd08c; --warn: #e8b84a;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
         font: 14px/1.5 -apple-system, "SF Pro Text", Helvetica, sans-serif; }
  header { padding: 14px 22px; display: flex; align-items: baseline; gap: 12px;
           border-bottom: 1px solid #2c303a; }
  header h1 { font-size: 17px; margin: 0; letter-spacing: .3px; }
  header .sub { color: var(--dim); font-size: 12px; }
  #quit { margin-left: auto; font-size: 12px; padding: 3px 12px; }
  main { display: grid; grid-template-columns: 300px 1fr; gap: 16px; padding: 16px 22px; }

  .col { display: flex; flex-direction: column; gap: 14px; }
  .card { background: var(--panel); border: 1px solid #2c303a; border-radius: 10px; padding: 14px; }
  .card h2 { margin: 0 0 10px; font-size: 12px; text-transform: uppercase;
             letter-spacing: 1px; color: var(--dim); }

  .drop { border: 1.5px dashed #3a4050; border-radius: 8px; aspect-ratio: 16 / 9;
          display: flex; align-items: center; justify-content: center; cursor: pointer;
          color: var(--dim); text-align: center; padding: 8px; position: relative;
          background-size: cover; background-position: center; transition: border-color .15s; }
  .drop.over { border-color: var(--accent); color: var(--accent); }
  .drop.filled { color: transparent; border-style: solid; }
  .drop input { display: none; }

  button { background: var(--panel2); color: var(--text); border: 1px solid #3a4050;
           border-radius: 7px; padding: 8px 14px; cursor: pointer; font-size: 13px; }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #16181d; font-weight: 600; }
  button.primary:disabled { opacity: .4; cursor: default; }
  button.wide { width: 100%; margin-top: 8px; }

  select { background: var(--panel2); color: var(--text);
    border: 1px solid #3a4050; border-radius: 6px; padding: 6px 8px; font-size: 13px; }
  label.row { display: flex; align-items: center; justify-content: space-between; margin: 8px 0; gap: 10px; }
  label.row span.name { min-width: 74px; }
  input[type=range] { flex: 1; accent-color: var(--accent); }
  input[type=checkbox] { accent-color: var(--accent); }
  .val { width: 44px; text-align: right; color: var(--accent2); font-variant-numeric: tabular-nums; }

  #warnings { color: var(--warn); font-size: 12px; white-space: pre-line; margin: 6px 0 0; }
  #correction-summary { color: var(--dim); font-size: 12px; margin: 4px 0 0; }
  #error { color: #e86a6a; font-size: 12px; white-space: pre-line; margin: 6px 0 0; }

  .preview-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .preview-head h2 { margin: 0; }
  #fullscreen { padding: 4px 10px; font-size: 12px; }
  .preview-wrap { position: relative; border-radius: 8px; overflow: hidden;
                  background: #000; aspect-ratio: 16 / 9; user-select: none; cursor: col-resize; }
  .preview-wrap:fullscreen { border-radius: 0; aspect-ratio: auto; }
  .preview-wrap img { display: block; width: 100%; height: 100%; object-fit: contain;
                      pointer-events: none; }
  #before { position: absolute; inset: 0; clip-path: inset(0 calc(100% - var(--wipe, 30%)) 0 0); }
  #wipe-handle { position: absolute; top: 0; bottom: 0; left: var(--wipe, 30%); width: 2px;
                 background: var(--accent); pointer-events: none; }
  #wipe-handle::after { content: "◂ before | after ▸"; position: absolute; top: 8px; left: 6px;
                        font-size: 10px; color: var(--accent); white-space: nowrap; }
  .mode-row { display: flex; gap: 8px; margin-top: 10px; align-items: center; }
  .placeholder { position: absolute; inset: 0; display: flex; align-items: center;
                 justify-content: center; color: var(--dim); }

  .tune-grid { display: grid; grid-template-columns: 1fr 1fr; column-gap: 24px; }
  .slots { display: flex; gap: 10px; align-items: center; margin-left: auto; }
  .slot { display: flex; }
  .slot button { padding: 6px 10px; }
  .slot .load { border-radius: 7px 0 0 7px; min-width: 34px; color: var(--dim); }
  .slot.filled .load { color: var(--text); border-color: #4a5060; }
  .slot.active .load { border-color: var(--accent2); color: var(--accent2); }
  .slot .save { border-radius: 0 7px 7px 0; border-left: none; font-size: 11px; color: var(--dim); }
  .slot .save:hover { color: var(--accent); }
</style>
</head>
<body>
<header>
  <h1>LUT&nbsp;Match</h1>
  <span class="sub">reference vibe → .cube for Premiere</span>
  <button id="quit" title="Stop LUT Match">✕ Quit</button>
</header>
<main>
  <div class="col">
    <div class="card">
      <h2>1 · Reference (the vibe)</h2>
      <div class="drop" id="drop-reference">Drop reference image<input type="file" accept="image/*"></div>
    </div>
    <div class="card">
      <h2>2 · Footage frame</h2>
      <div class="drop" id="drop-frame">Drop a still frame of your footage<input type="file" accept="image/*"></div>
      <label class="row" style="margin-top:10px"><span class="name">Footage type</span>
        <select id="footage-type">
          <option value="rec709">Rec.709 / normal</option>
          <option value="slog3">Sony S-Log3</option>
          <option value="vlog">Panasonic V-Log</option>
          <option value="clog3">Canon C-Log3</option>
          <option value="generic_log">Generic log</option>
        </select>
      </label>
    </div>
    <div class="card">
      <h2>3 · Match</h2>
      <label class="row" style="margin:0"><span>Auto-correct lighting first</span>
        <input type="checkbox" id="auto-correct" checked>
      </label>
      <label class="row"><span class="name">Correction</span>
        <input type="range" id="correction-strength" min="0" max="1" step="0.02" value="1"><span class="val" id="correction-val">100%</span>
      </label>
      <p id="correction-summary"></p>
      <label class="row"><span>Keep original brightness</span>
        <input type="checkbox" id="keep-luma">
      </label>
      <button class="primary wide" id="analyze" disabled>Match colors</button>
      <p id="warnings"></p>
      <p id="error"></p>
    </div>
  </div>

  <div class="col">
    <div class="card">
      <div class="preview-head">
        <h2>Preview — hover to compare</h2>
        <button id="fullscreen" title="Full screen">⛶ Full screen</button>
      </div>
      <div class="preview-wrap" id="preview-wrap">
        <div class="placeholder" id="placeholder">load a reference and a frame, then Match colors</div>
        <img id="after" style="display:none" alt="">
        <img id="before" style="display:none" alt="">
        <div id="wipe-handle" style="display:none"></div>
      </div>
      <label class="row" style="margin-top:12px"><span class="name">Strength</span>
        <input type="range" id="strength" min="0" max="1" step="0.02" value="1"><span class="val" id="strength-val">100%</span>
      </label>
      <div class="mode-row">
        <button class="primary" id="export" disabled>⬇ Export .cube</button>
        <div class="slots" id="slots">
          <span style="color:var(--dim);font-size:12px">Compare:</span>
        </div>
      </div>
    </div>
    <div class="card" id="tweaks" style="display:none">
      <h2>4 · Fine-tune</h2>
      <div class="tune-grid">
        <label class="row"><span class="name">Temp</span><input type="range" id="temperature" min="-1" max="1" step="0.02" value="0"><span class="val">0.00</span></label>
        <label class="row"><span class="name">Tint</span><input type="range" id="tint" min="-1" max="1" step="0.02" value="0"><span class="val">0.00</span></label>
        <label class="row"><span class="name">Contrast</span><input type="range" id="contrast" min="0.4" max="2" step="0.02" value="1"><span class="val">1.00</span></label>
        <label class="row"><span class="name">Saturation</span><input type="range" id="saturation" min="0" max="2" step="0.02" value="1"><span class="val">1.00</span></label>
        <label class="row"><span class="name">Shadows</span><input type="range" id="shadows" min="-1" max="1" step="0.02" value="0"><span class="val">0.00</span></label>
        <label class="row"><span class="name">Highlights</span><input type="range" id="highlights" min="-1" max="1" step="0.02" value="0"><span class="val">0.00</span></label>
      </div>
      <button id="reset-tweaks" style="margin-top:6px">Reset fine-tune</button>
    </div>
  </div>
</main>

<script>
const $ = id => document.getElementById(id);
const state = { reference: false, frame: false, ready: false };

function setError(msg) { $("error").textContent = msg || ""; }

async function api(path, opts) {
  const res = await fetch(path, opts);
  if (!res.ok) {
    let detail = res.statusText;
    try { detail = (await res.json()).detail; } catch {}
    throw new Error(detail);
  }
  return res.headers.get("content-type")?.includes("json") ? res.json() : res;
}

function updateButtons() {
  $("analyze").disabled = !(state.reference && state.frame);
  $("export").disabled = !state.ready;
}

function showWarnings(w) {
  const all = [...(w?.reference || []), ...(w?.frame || [])];
  $("warnings").textContent = all.join("\n");
}

function setCorrectionSummary(s) { $("correction-summary").textContent = s || ""; }

// --- drop zones ---
for (const kind of ["reference", "frame"]) {
  const zone = $("drop-" + kind);
  const input = zone.querySelector("input");
  zone.onclick = () => input.click();
  input.onchange = () => input.files[0] && sendFile(kind, input.files[0]);
  zone.ondragover = e => { e.preventDefault(); zone.classList.add("over"); };
  zone.ondragleave = () => zone.classList.remove("over");
  zone.ondrop = e => {
    e.preventDefault(); zone.classList.remove("over");
    if (e.dataTransfer.files[0]) sendFile(kind, e.dataTransfer.files[0]);
  };
}

async function sendFile(kind, file) {
  setError("");
  const fd = new FormData(); fd.append("file", file);
  try {
    const out = await api("/upload/" + kind, { method: "POST", body: fd });
    afterImageSet(kind, out.warnings);
  } catch (e) { setError(e.message); }
}

function afterImageSet(kind, warnings) {
  state[kind] = true; state.ready = false;
  const zone = $("drop-" + kind);
  zone.classList.add("filled");
  zone.style.backgroundImage = `url(/image/${kind}?t=${Date.now()})`;
  showWarnings({ [kind]: warnings });
  setCorrectionSummary("");
  updateButtons();
}

// --- match ---
$("analyze").onclick = async () => {
  setError("");
  $("analyze").disabled = true;
  try {
    const out = await api("/analyze", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        footage_type: $("footage-type").value,
        auto_correct: $("auto-correct").checked,
      }),
    });
    state.ready = true;
    setCorrectionSummary(out.correction_summary);
    resetTweakSliders();
    $("tweaks").style.display = "";
    refreshPreview();
  } catch (e) { setError(e.message); }
  finally { $("analyze").disabled = false; updateButtons(); }
};

// --- live options (auto-correct, correction strength, keep-luma) ---
async function pushOptions(payload) {
  try {
    const out = await api("/options", { method: "POST", headers: { "Content-Type": "application/json" },
                                        body: JSON.stringify(payload) });
    if (out.correction_summary !== undefined) setCorrectionSummary(out.correction_summary);
    refreshPreview();
  } catch (e) { setError(e.message); }
}
$("auto-correct").onchange = () => pushOptions({ auto_correct: $("auto-correct").checked });
$("keep-luma").onchange = () => pushOptions({ keep_luma: $("keep-luma").checked });
$("correction-strength").oninput = () => {
  $("correction-val").textContent = Math.round($("correction-strength").value * 100) + "%";
};
$("correction-strength").onchange = () =>
  pushOptions({ correction_strength: +$("correction-strength").value });

// --- fine-tune sliders ---
const TWEAKS = { temperature: 0, tint: 0, contrast: 1, saturation: 1, shadows: 0, highlights: 0 };

function resetTweakSliders(push = true) {
  for (const [k, dflt] of Object.entries(TWEAKS)) setSlider(k, dflt);
  if (push) pushTweaks();
}

function setSlider(id, value) {
  const el = $(id);
  el.value = value;
  el.nextElementSibling.textContent = (+value).toFixed(2);
}

async function pushTweaks() {
  const recipe = {};
  for (const k of Object.keys(TWEAKS)) recipe[k] = +$(k).value;
  try {
    await api("/tweaks", { method: "POST", headers: { "Content-Type": "application/json" },
                           body: JSON.stringify({ recipe }) });
    refreshPreview();
  } catch (e) { setError(e.message); }
}

for (const k of Object.keys(TWEAKS)) {
  const el = $(k);
  el.oninput = () => { el.nextElementSibling.textContent = (+el.value).toFixed(2); };
  el.onchange = pushTweaks;
}
$("reset-tweaks").onclick = () => resetTweakSliders();

// --- preview ---
let previewTimer = null;
function refreshPreview() {
  if (!state.ready) return;
  clearTimeout(previewTimer);
  previewTimer = setTimeout(() => {
    $("placeholder").style.display = "none";
    $("after").src = `/preview?strength=${$("strength").value}&t=${Date.now()}`;
    $("before").src = `/image/frame?t=${Date.now()}`;
    for (const id of ["after", "before", "wipe-handle"]) $(id).style.display = "";
  }, 120);
}

$("strength").oninput = () => {
  $("strength-val").textContent = Math.round($("strength").value * 100) + "%";
  refreshPreview();
};

// --- fullscreen ---
$("fullscreen").onclick = () => {
  if (document.fullscreenElement) document.exitFullscreen();
  else $("preview-wrap").requestFullscreen();
};

// --- hover wipe: the divider follows the mouse, no clicking needed ---
const wrap = $("preview-wrap");
wrap.onpointermove = e => {
  const r = wrap.getBoundingClientRect();
  const pct = Math.min(97, Math.max(3, ((e.clientX - r.left) / r.width) * 100));
  $("before").style.setProperty("--wipe", pct + "%");
  $("wipe-handle").style.left = pct + "%";
};

// --- A/B/C save slots (this session) ---
const SLOT_NAMES = ["A", "B", "C"];
function currentSettings() {
  const tweaks = {};
  for (const k of Object.keys(TWEAKS)) tweaks[k] = +$(k).value;
  return {
    tweaks,
    strength: +$("strength").value,
    correction_strength: +$("correction-strength").value,
    auto_correct: $("auto-correct").checked,
    keep_luma: $("keep-luma").checked,
  };
}

async function loadSettings(s) {
  for (const [k, v] of Object.entries(s.tweaks)) setSlider(k, v);
  $("strength").value = s.strength;
  $("strength-val").textContent = Math.round(s.strength * 100) + "%";
  $("correction-strength").value = s.correction_strength;
  $("correction-val").textContent = Math.round(s.correction_strength * 100) + "%";
  $("auto-correct").checked = s.auto_correct;
  $("keep-luma").checked = s.keep_luma;
  await api("/options", { method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ correction_strength: s.correction_strength,
                           auto_correct: s.auto_correct, keep_luma: s.keep_luma }) })
    .then(out => setCorrectionSummary(out.correction_summary));
  await pushTweaks();
}

function slotKey(n) { return "lutmatch-slot-" + n; }

function renderSlots(activeName) {
  for (const n of SLOT_NAMES) {
    const el = $("slot-" + n);
    el.classList.toggle("filled", !!sessionStorage.getItem(slotKey(n)));
    el.classList.toggle("active", n === activeName);
  }
}

for (const n of SLOT_NAMES) {
  const div = document.createElement("div");
  div.className = "slot"; div.id = "slot-" + n;
  const load = document.createElement("button");
  load.className = "load"; load.textContent = n; load.title = "Load " + n;
  load.onclick = async () => {
    const raw = sessionStorage.getItem(slotKey(n));
    if (!raw) { setError("Slot " + n + " is empty — press its save button first."); return; }
    setError("");
    await loadSettings(JSON.parse(raw));
    renderSlots(n);
  };
  const save = document.createElement("button");
  save.className = "save"; save.textContent = "save"; save.title = "Save current settings to " + n;
  save.onclick = () => {
    if (!state.ready) { setError("Nothing to save yet — run Match colors first."); return; }
    setError("");
    sessionStorage.setItem(slotKey(n), JSON.stringify(currentSettings()));
    renderSlots(n);
  };
  div.append(load, save);
  $("slots").appendChild(div);
}
renderSlots(null);

// --- export & quit ---
$("export").onclick = () => {
  window.location = `/export?strength=${$("strength").value}`;
};
$("quit").onclick = async () => {
  try { await api("/shutdown", { method: "POST" }); } catch {}
  document.body.innerHTML = '<p style="padding:40px;color:#8a90a0">LUT Match closed. You can close this tab.</p>';
};

// --- init ---
(async () => {
  try {
    const st = await api("/status");
    if (st.reference) afterImageSet("reference", st.warnings?.reference || []);
    if (st.frame) afterImageSet("frame", st.warnings?.frame || []);
    if (st.footage_type) $("footage-type").value = st.footage_type;
    if (st.ready) {
      state.ready = true;
      $("tweaks").style.display = "";
      setCorrectionSummary(st.correction_summary);
      refreshPreview();
      updateButtons();
    }
    renderSlots(null);
  } catch {}
})();
</script>
</body>
</html>
