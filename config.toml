# LUT Match configuration

[vision]
# provider: "claude" (Claude Code CLI), "cli" (any CLI agent), "ollama", or "none"
provider = "claude"

# For provider = "claude": path to the claude binary if not on PATH.
# claude_binary = "/usr/local/bin/claude"

# For provider = "cli": full command template; {prompt} is replaced with the prompt.
# command_template = "code-puppy --headless {prompt}"

# For provider = "ollama":
# model = "llava"
# base_url = "http://localhost:11434"

